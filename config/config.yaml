    latitude: 36.3650
    longitude: 6.6147
    wilaya_number: 25
  - name: "Annaba"
    code: "ANN"
    latitude: 36.9000
    longitude: 7.7667
    wilaya_number: 23
  - name: "Tlemcen"
    code: "TLE"
    latitude: 34.8828
    longitude: -1.3167
    wilaya_number: 13
  - name: "Sétif"
    code: "SET"
    latitude: 36.1833
    longitude: 5.4000
    wilaya_number: 19
  - name: "Blida"
    code: "BLI"
