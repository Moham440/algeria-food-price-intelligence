# ============================================================
# Algeria Food Price Intelligence System - Configuration
# ============================================================

project:
  name: "Algeria Food Price Intelligence System"
  version: "1.0.0"
  description: "End-to-end food price monitoring and prediction for Algeria"

# ── Data Sources ──────────────────────────────────────────────
data_sources:
  fao:
    base_url: "https://fenixservices.fao.org/faostat/api/v1"
    endpoints:
      price_data: "/data/PP"
      food_balance: "/data/FBS"
    timeout: 30
    retry_attempts: 3
    rate_limit_delay: 1.0  # seconds between requests

  wfp:
    base_url: "https://data.humdata.org"
    dataset_id: "wfp-food-prices-for-algeria"
    api_url: "https://api.hungermapdata.org/v2"
    timeout: 30
    retry_attempts: 3

  world_bank:
    base_url: "https://api.worldbank.org/v2"
    indicators:
      inflation: "FP.CPI.TOTL.ZG"
      gdp_per_capita: "NY.GDP.PCAP.CD"
    country_code: "DZA"

